<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#fafaf8">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>NewsLens — 同じニュース、違う伝え方</title>
<style>
  :root {
    --ink: #1a1c20;
    --paper: #fafaf8;
    --card: #ffffff;
    --line: #e6e4de;
    --muted: #8a8880;
    --accent: #c2452d;
    --covered: #1a1c20;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
    background: var(--paper); color: var(--ink); line-height: 1.6;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: color-mix(in srgb, var(--paper) 92%, transparent);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  .bar {
    max-width: 640px; margin: 0 auto; padding: 12px 16px 8px;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .logo { font-weight: 800; font-size: 18px; letter-spacing: .04em; }
  .logo span { color: var(--accent); }
  .updated { font-size: 11px; color: var(--muted); }

  nav, .subnav {
    max-width: 640px; margin: 0 auto; padding: 0 12px 8px;
    display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
  }
  nav::-webkit-scrollbar, .subnav::-webkit-scrollbar { display: none; }
  .subnav { padding-bottom: 10px; }
  .tab, .chipbtn {
    flex-shrink: 0; font-family: inherit; font-weight: 600;
    border: 1px solid var(--line); background: var(--card); color: var(--muted);
    border-radius: 999px; cursor: pointer;
  }
  .tab { font-size: 13px; padding: 5px 14px; }
  .tab.active { background: var(--ink); border-color: var(--ink); color: #fff; }
  .chipbtn { font-size: 11.5px; padding: 3px 11px; }
  .chipbtn.active { background: #f1e5e2; border-color: var(--accent); color: var(--accent); }

  main { max-width: 640px; margin: 0 auto; padding: 12px 12px 60px; }

  .topic {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px; margin-bottom: 12px;
  }
  .head { display: flex; gap: 12px; flex-direction: row; }
  .head .txt { flex: 1; min-width: 0; }
  .chips { display: flex; gap: 8px; margin-bottom: 6px; align-items: baseline; }
  .chip { font-size: 11px; font-weight: 700; border-radius: 4px; padding: 1px 8px; background: #f0efe9; color: #6b6960; }
  .chip.time { background: transparent; color: var(--muted); font-weight: 400; padding: 0; }
  .topic h2 { font-size: 15.5px; font-weight: 700; line-height: 1.5; }
  .thumb-wrap { flex-shrink: 0; width: 122px; height: 92px; align-self: flex-start; position: relative; }
  .thumb {
    width: 100%; height: 100%; border-radius: 8px;
    object-fit: cover; background: var(--line); display: block;
  }
  .thumb-ph {
    width: 100%; height: 100%; border-radius: 8px;
    display: grid; place-items: center;
    font-size: 22px; font-weight: 800; letter-spacing: .05em;
  }
  .ph-politics { background: #e8ecf4; color: #2b4c7e; }
  .ph-economy  { background: #e6f0e8; color: #2c6e49; }
  .ph-world    { background: #e5eef4; color: #1d6a96; }
  .ph-society  { background: #f6ece2; color: #a3612a; }
  .ph-tech     { background: #ece8f4; color: #5b4a8a; }
  .ph-other    { background: #efefec; color: #77756c; }

  /* シグネチャ:媒体カバレッジ表 */
  .coverage { margin-top: 12px; display: grid; gap: 8px; }
  .cov-row { display: grid; gap: 3px; }
  .cov-label { font-size: 10.5px; color: var(--muted); letter-spacing: .02em; }
  .cov-icons { display: flex; gap: 4px; flex-wrap: wrap; }
  .cov {
    display: grid; justify-items: center; gap: 2px; width: 52px;
  }
  .cov .icon {
    width: 32px; height: 32px; border-radius: 8px; overflow: hidden;
    border: 1.5px solid var(--line); background: #fff;
    display: grid; place-items: center;
  }
  .cov .icon img { width: 22px; height: 22px; object-fit: contain; }
  .cov .nm { font-size: 9px; color: var(--ink); line-height: 1.2; text-align: center; white-space: nowrap; overflow: hidden; max-width: 52px; }
  .cov.off .icon img { filter: grayscale(1); opacity: .25; }
  .cov.off .nm { color: #c6c4bc; }
  .cov.on .icon { border-color: var(--covered); }
  .cov-note { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .meta { font-size: 12px; color: var(--muted); margin-top: 8px; }

  .articles { display: none; border-top: 1px solid var(--line); margin-top: 12px; padding-top: 4px; }
  .topic.open .articles { display: block; }
  .outlet-block { padding: 9px 0; }
  .outlet-block + .outlet-block { border-top: 1px dashed var(--line); }
  .article { display: flex; gap: 10px; text-decoration: none; color: inherit; align-items: baseline; }
  .article:hover .t { text-decoration: underline; }
  .article .t { font-size: 13.5px; }
  .badge {
    flex-shrink: 0; display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 700; color: #444;
    background: #f0efe9; border-radius: 4px; padding: 1px 8px 1px 5px; white-space: nowrap;
  }
  .badge img { width: 13px; height: 13px; }
  .more-arts { margin: 6px 0 0 0; }
  .more-arts summary { font-size: 11.5px; color: var(--muted); cursor: pointer; list-style: none; }
  .more-arts summary::before { content: "▸ "; }
  .more-arts[open] summary::before { content: "▾ "; }
  .more-arts .article { padding-top: 7px; }

  .toggle {
    width: 100%; background: none; border: none; color: var(--muted);
    font-size: 12px; padding: 8px 0 0; cursor: pointer; font-family: inherit;
  }
  .toggle:focus-visible, .tab:focus-visible, .chipbtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .empty { text-align: center; color: var(--muted); padding: 60px 0; font-size: 14px; }
  footer { max-width: 640px; margin: 0 auto; text-align: center; font-size: 11px; color: var(--muted); padding: 20px 16px; line-height: 1.8; }
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo">News<span>Lens</span></div>
    <div class="updated" id="updated"></div>
  </div>
  <nav id="cats"></nav>
  <div class="subnav" id="filters"></div>
</header>
<main>
  <div id="feed"><div class="empty">読み込み中…</div></div>
</main>
<footer>
  グレーの媒体アイコンは「この期間のフィードで掲載を確認できなかった」ことを示します(報道していないと断定するものではありません)。<br>
  NewsLens プロトタイプ — 見出し・画像の著作権は各媒体に帰属します
</footer>
<script>
(async () => {
  const feed = document.getElementById("feed");
  let data;
  try {
    data = await (await fetch("data.json?t=" + Date.now())).json();
  } catch {
    feed.innerHTML = '<div class="empty">データを読み込めませんでした。再読み込みしてください。</div>';
    return;
  }

  document.getElementById("updated").textContent =
    new Date(data.generatedAt).toLocaleString("ja-JP",
      { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" }) + " 更新";

  const esc = (s) => String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const rel = (iso) => {
    const min = Math.max(0, Math.round((Date.now() - Date.parse(iso)) / 60000));
    if (min < 60) return `${min}分前`;
    if (min < 1440) return `${Math.round(min / 60)}時間前`;
    return `${Math.round(min / 1440)}日前`;
  };
  const favicon = (domain) =>
    `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=64`;

  const CATS = [
    { id: "all",      label: "すべて" },
    { id: "politics", label: "政治" },
    { id: "economy",  label: "経済" },
    { id: "world",    label: "国際" },
    { id: "society",  label: "社会" },
    { id: "tech",     label: "IT・科学" },
    { id: "other",    label: "その他" },
  ];
  const FILTERS = [
    { id: "all",    label: "すべて",           f: () => true },
    { id: "multi",  label: "見比べられる(2媒体以上)", f: (t) => t.outletCount >= 2 },
    { id: "single", label: "単独報道",          f: (t) => t.outletCount === 1 },
  ];
  let activeCat = "all", activeFilter = "all";

  const catLabel = Object.fromEntries(CATS.map((c) => [c.id, c.label]));
  const groups = [
    { id: "press", label: "新聞・通信・放送" },
    { id: "web",   label: "ウェブメディア" },
  ];

  function visibleTopics() {
    const f = FILTERS.find((x) => x.id === activeFilter).f;
    return data.topics.filter((t) => (activeCat === "all" || t.cat === activeCat) && f(t));
  }

  function renderNav() {
    document.getElementById("cats").innerHTML = CATS.map((c) => {
      const n = data.topics.filter((t) => c.id === "all" || t.cat === c.id).length;
      if (c.id !== "all" && n === 0) return "";
      return `<button class="tab ${c.id === activeCat ? "active" : ""}" data-cat="${c.id}">${c.label}</button>`;
    }).join("");
    document.getElementById("filters").innerHTML = FILTERS.map((f) =>
      `<button class="chipbtn ${f.id === activeFilter ? "active" : ""}" data-filter="${f.id}">${f.label}</button>`
    ).join("");
  }

  function coverageMatrix(t) {
    const covered = new Set(t.outlets.map((o) => o.outletId));
    return `<div class="coverage">` + groups.map((g) => {
      const list = data.outlets.filter((o) => o.group === g.id);
      if (!list.length) return "";
      return `<div class="cov-row">
        <span class="cov-label">${g.label}</span>
        <span class="cov-icons">${list.map((o) => `
          <span class="cov ${covered.has(o.id) ? "on" : "off"}" title="${esc(o.name)}${covered.has(o.id) ? "" : ":未確認"}">
            <span class="icon"><img src="${favicon(o.domain)}" alt="${esc(o.name)}" loading="lazy"></span>
            <span class="nm">${esc(o.name)}</span>
          </span>`).join("")}</span>
      </div>`;
    }).join("") + `</div>`;
  }

  function articleRow(o, a) {
    const outlet = data.outlets.find((x) => x.id === o.outletId) || {};
    return `<a class="article" href="${esc(a.url)}" target="_blank" rel="noopener">
      <span class="badge"><img src="${favicon(outlet.domain || "")}" alt="">${esc(o.outletName)}</span>
      <span class="t">${esc(a.title)}</span>
    </a>`;
  }

  function renderFeed() {
    const topics = visibleTopics();
    if (!topics.length) {
      feed.innerHTML = '<div class="empty">この条件のトピックはまだありません。次の自動更新をお待ちください。</div>';
      return;
    }
    feed.innerHTML = topics.map((t) => `
      <article class="topic">
        <div class="head">
          <div class="txt">
            <div class="chips">
              <span class="chip">${catLabel[t.cat] || "その他"}</span>
              <span class="chip time">${rel(t.updatedAt)} ・ ${t.outletCount}媒体</span>
            </div>
            <h2>${esc(t.topic)}</h2>
          </div>
          <span class="thumb-wrap">
            ${t.image ? `<img class="thumb" src="${esc(t.image)}" alt="" loading="lazy" referrerpolicy="no-referrer"
              onerror="this.style.display='none';this.nextElementSibling.style.display='grid'">` : ""}
            <span class="thumb-ph ph-${esc(t.cat)}" style="display:${t.image ? "none" : "grid"}">${({politics:"政治",economy:"経済",world:"国際",society:"社会",tech:"IT",other:"NEWS"})[t.cat] || "NEWS"}</span>
          </span>
        </div>
        ${coverageMatrix(t)}
        <div class="articles">
          ${t.outlets.map((o) => {
            const [first, ...rest] = o.articles;
            return `<div class="outlet-block">
              ${articleRow(o, first)}
              ${rest.length ? `<details class="more-arts"><summary>続報など他${rest.length}件</summary>
                ${rest.map((a) => articleRow(o, a)).join("")}</details>` : ""}
            </div>`;
          }).join("")}
        </div>
        <button class="toggle">${t.outletCount > 1 ? "各社の伝え方を見る ▾" : "記事を見る ▾"}</button>
      </article>`).join("");
  }

  document.getElementById("cats").addEventListener("click", (e) => {
    const btn = e.target.closest(".tab"); if (!btn) return;
    activeCat = btn.dataset.cat; renderNav(); renderFeed(); window.scrollTo({ top: 0 });
  });
  document.getElementById("filters").addEventListener("click", (e) => {
    const btn = e.target.closest(".chipbtn"); if (!btn) return;
    activeFilter = btn.dataset.filter; renderNav(); renderFeed(); window.scrollTo({ top: 0 });
  });
  feed.addEventListener("click", (e) => {
    const btn = e.target.closest(".toggle"); if (!btn) return;
    const card = btn.closest(".topic");
    card.classList.toggle("open");
    btn.textContent = card.classList.contains("open") ? "閉じる ▴"
      : (card.querySelectorAll(".outlet-block").length > 1 ? "各社の伝え方を見る ▾" : "記事を見る ▾");
  });

  renderNav(); renderFeed();
})();
</script>
</body>
</html>
