<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#fafaf8">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>NewsLens — 同じニュース、違う伝え方</title>
<style>
  :root {
    --ink: #1a1c20;
    --paper: #fafaf8;
    --card: #ffffff;
    --line: #e6e4de;
    --muted: #8a8880;
    --est: #2b4c7e;    /* 藍:既成メディア */
    --indie: #c2452d;  /* 朱:独立系メディア */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
    background: var(--paper); color: var(--ink); line-height: 1.6;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: color-mix(in srgb, var(--paper) 92%, transparent);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  .bar {
    max-width: 640px; margin: 0 auto; padding: 12px 16px 8px;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .logo { font-weight: 800; font-size: 18px; letter-spacing: .04em; }
  .logo span { color: var(--indie); }
  .updated { font-size: 11px; color: var(--muted); }

  /* フィルタタブ */
  nav {
    max-width: 640px; margin: 0 auto; padding: 0 12px 10px;
    display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; font-family: inherit; font-size: 12.5px; font-weight: 600;
    border: 1px solid var(--line); background: var(--card); color: var(--muted);
    border-radius: 999px; padding: 5px 13px; cursor: pointer;
  }
  .tab.active { background: var(--ink); border-color: var(--ink); color: #fff; }
  .tab .n { font-weight: 400; opacity: .7; margin-left: 3px; }

  main { max-width: 640px; margin: 0 auto; padding: 12px 12px 60px; }
  .legend { display: flex; gap: 16px; font-size: 12px; color: var(--muted); padding: 2px 4px 12px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 5px; }
  .dot.est { background: var(--est); } .dot.indie { background: var(--indie); }

  .topic {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px; margin-bottom: 12px;
  }
  .chips { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .chip {
    font-size: 11px; font-weight: 700; border-radius: 4px; padding: 1px 8px;
  }
  .chip.both { background: #eef1f6; color: var(--est); }
  .chip.indieOnly { background: #f9ece9; color: var(--indie); }
  .chip.estOnly { background: #eef1f6; color: var(--est); }
  .chip.time { background: transparent; color: var(--muted); font-weight: 400; padding-left: 0; }
  .topic h2 { font-size: 16px; font-weight: 700; margin-bottom: 10px; }

  /* シグネチャ:報道バランスバー */
  .balance { display: flex; height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 6px; background: var(--line); }
  .balance .est { background: var(--est); } .balance .indie { background: var(--indie); }
  .meta { font-size: 12px; color: var(--muted); }

  .articles { display: none; border-top: 1px solid var(--line); margin-top: 12px; padding-top: 6px; }
  .topic.open .articles { display: block; }
  .article { display: flex; gap: 10px; padding: 9px 0; text-decoration: none; color: inherit; align-items: baseline; }
  .article + .article { border-top: 1px dashed var(--line); }
  .badge {
    flex-shrink: 0; font-size: 11px; font-weight: 700; color: #fff;
    border-radius: 4px; padding: 1px 7px; white-space: nowrap;
  }
  .badge.est { background: var(--est); } .badge.indie { background: var(--indie); }
  .article .t { font-size: 13.5px; }
  .article:hover .t { text-decoration: underline; }
  .toggle {
    width: 100%; background: none; border: none; color: var(--muted);
    font-size: 12px; padding: 8px 0 0; cursor: pointer; font-family: inherit;
  }
  .toggle:focus-visible, .tab:focus-visible { outline: 2px solid var(--est); outline-offset: 2px; }
  .empty { text-align: center; color: var(--muted); padding: 60px 0; font-size: 14px; }
  footer { text-align: center; font-size: 11px; color: var(--muted); padding: 20px; }
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo">News<span>Lens</span></div>
    <div class="updated" id="updated"></div>
  </div>
  <nav id="tabs"></nav>
</header>
<main>
  <div class="legend">
    <span><i class="dot est"></i>既成メディア</span>
    <span><i class="dot indie"></i>独立系メディア</span>
  </div>
  <div id="feed"><div class="empty">読み込み中…</div></div>
</main>
<footer>NewsLens プロトタイプ — 見出しの著作権は各媒体に帰属します</footer>
<script>
(async () => {
  const feed = document.getElementById("feed");
  const tabsEl = document.getElementById("tabs");
  let data;
  try {
    data = await (await fetch("data.json?t=" + Date.now())).json();
  } catch {
    feed.innerHTML = '<div class="empty">データを読み込めませんでした。再読み込みしてください。</div>';
    return;
  }

  document.getElementById("updated").textContent =
    new Date(data.generatedAt).toLocaleString("ja-JP",
      { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" }) + " 更新";

  const esc = (s) => s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const rel = (iso) => {
    const min = Math.max(0, Math.round((Date.now() - Date.parse(iso)) / 60000));
    if (min < 60) return `${min}分前`;
    if (min < 1440) return `${Math.round(min / 60)}時間前`;
    return `${Math.round(min / 1440)}日前`;
  };
  const covLabel = { both: "両サイドが報道", indieOnly: "独立系のみが報道", estOnly: "既成のみが報道" };

  const TABS = [
    { id: "all",       label: "すべて",        f: () => true },
    { id: "both",      label: "両サイド比較",   f: (t) => t.coverage === "both" },
    { id: "indieOnly", label: "独立系のみ",     f: (t) => t.coverage === "indieOnly" },
    { id: "estOnly",   label: "既成のみ",       f: (t) => t.coverage === "estOnly" },
  ];
  let active = "all";

  function renderTabs() {
    tabsEl.innerHTML = TABS.map((tab) => {
      const n = data.topics.filter(tab.f).length;
      return `<button class="tab ${tab.id === active ? "active" : ""}" data-tab="${tab.id}">
        ${tab.label}<span class="n">${n}</span></button>`;
    }).join("");
  }

  function renderFeed() {
    const tab = TABS.find((t) => t.id === active);
    const topics = data.topics.filter(tab.f);
    if (!topics.length) {
      feed.innerHTML = '<div class="empty">このカテゴリのトピックはまだありません。次の自動更新をお待ちください。</div>';
      return;
    }
    feed.innerHTML = topics.map((t) => {
      const total = t.estCount + t.indieCount;
      const estPct = Math.round(t.estCount / total * 100);
      const multi = t.articles.length > 1;
      return `
      <article class="topic">
        <div class="chips">
          <span class="chip ${t.coverage}">${covLabel[t.coverage]}</span>
          <span class="chip time">${rel(t.updatedAt)}</span>
        </div>
        <h2>${esc(t.topic)}</h2>
        <div class="balance">
          <div class="est" style="width:${estPct}%"></div>
          <div class="indie" style="width:${100 - estPct}%"></div>
        </div>
        <div class="meta">${t.sourceCount}媒体 ・ 既成 ${t.estCount}件 / 独立系 ${t.indieCount}件</div>
        <div class="articles">
          ${t.articles.map(a => `
            <a class="article" href="${esc(a.url)}" target="_blank" rel="noopener">
              <span class="badge ${a.camp}">${esc(a.sourceName)}</span>
              <span class="t">${esc(a.title)}</span>
            </a>`).join("")}
        </div>
        <button class="toggle">${multi ? "各社の伝え方を見る ▾" : "記事を見る ▾"}</button>
      </article>`;
    }).join("");
  }

  tabsEl.addEventListener("click", (e) => {
    const btn = e.target.closest(".tab");
    if (!btn) return;
    active = btn.dataset.tab;
    renderTabs(); renderFeed();
    window.scrollTo({ top: 0 });
  });

  feed.addEventListener("click", (e) => {
    const btn = e.target.closest(".toggle");
    if (!btn) return;
    const card = btn.closest(".topic");
    card.classList.toggle("open");
    btn.textContent = card.classList.contains("open") ? "閉じる ▴"
      : btn.textContent.replace("▴", "▾").replace("閉じる", "各社の伝え方を見る");
  });

  renderTabs(); renderFeed();
})();
</script>
</body>
</html>
