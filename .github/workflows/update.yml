name: ニュース自動更新

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: RSSを収集してdata.jsonを生成
        run: node scripts/fetch.mjs

      - name: 変更をコミット
        run: |
          git config user.name "newslens-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "自動更新"
          git push
